general {
    layout = scrolling

    allow_tearing = false  # Allows `immediate` window rule to work

    gaps_workspaces = $ws_gaps
    gaps_in = $win_gaps_in
    gaps_out = $win_gaps_out
    border_size = $win_border_size

    col.active_border = $active_win_border_color
    col.inactive_border = $inactive_win_border_color
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

scrolling {
  column_width = 0.67
  focus_fit_method = 1
  explicit_column_widths = 0.33, 0.5, 0.67, 0.81, 0.96
  follow_focus = true
  fullscreen_on_one_column = true
  direction = right
  follow_min_visible = 0.33
}
