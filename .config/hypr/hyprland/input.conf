input {
    kb_layout = us
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 35

    focus_on_close = 0
    follow_mouse = 2
    float_switch_override_focus = 0

    sensitivity = 0
    scroll_factor = $mouse_scroll_factor
    emulate_discrete_scroll = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        disable_while_typing = $touchpad_disable_typing
        scroll_factor = $touchpad_scroll_factor
        clickfinger_behavior = false
        middle_button_emulation = false
        tap-to-click = true
        drag_lock = false
    }
}

binds {
    scroll_event_delay = 0
}

cursor {
    hotspot_padding = 1
    sync_gsettings_theme = true
    no_hardware_cursors = 2 # change to 1 if want to disable
    enable_hyprcursor = true
    warp_on_change_workspace = 2
    no_warps = true
    inactive_timeout = 3  # hide after seconds
}

