# =======================================================================
# pam_env.conf - Environment Variable Configuration for PAM
# =======================================================================
#
# SYNTAX:
# VARIABLE  [DEFAULT=[value]]  [OVERRIDE=[value]]
#
# RULES & BEHAVIOR:
# - DEFAULT:  Sets the base value. If omitted, defaults to an empty string.
# - OVERRIDE: Overrides the default if a value exists. If omitted, no override occurs.
#
# INTERPOLATION:
# - ${string} -> Expands to standard environment variables (e.g., ${NON_CORE_ENV}).
# - @{string} -> Expands to PAM_ITEMs (e.g., @{PAM_RHOST}, @{CORE_ENV}).
#
# FORMATTING & ESCAPING:
# - Values can be delimited with double quotes ("value"). 
# - Escaped quotes (\"value\") are NOT supported.
# - Both $ and @ can be backslash-escaped for literal values (\$ and \@).
#
# NOTE:
#   The `@` symbol is used to reference special PAM_ITEMs (such as @{HOME}, @{SHELL},
#   @{PAM_USER}, or @{PAM_TYPE}) to distinguish them from standard shell environment
#   variables, which use `$`.
#
#
#
# =======================================================================
# EXAMPLES
# =======================================================================
#
# --- PAM_ITEMs and Special Variables ---
# Set REMOTEHOST to remote host, falling back to localhost
# REMOTEHOST   DEFAULT=localhost OVERRIDE=@{PAM_RHOST}
# DISPLAY      DEFAULT=${REMOTEHOST}:0.0 OVERRIDE=${DISPLAY}
#
# --- Standard Environment Variables ---
# PAGER        DEFAULT=less
# MANPAGER     DEFAULT=less
# NNTPSERVER   DEFAULT=localhost
#
# --- Quoted Values ---
# LESS         DEFAULT="M q e h15 z23 b80"
#
# --- Concatenation (Paths) ---
# PATH         DEFAULT=${HOME}/bin:/usr/local/bin:/bin:/usr/bin:/usr/bin/X11
#
# --- Escaping Literal Characters ---
# DOLLAR       DEFAULT=\$
# DOLLARDOLLAR DEFAULT=    OVERRIDE=\$${DOLLAR}
# ATSIGN       DEFAULT=""  OVERRIDE=\@


# XDG ENV
XDG_CACHE_HOME   DEFAULT=@{HOME}/.cache
XDG_CONFIG_HOME  DEFAULT=@{HOME}/.config
XDG_DATA_HOME    DEFAULT=@{HOME}/.local/share
XDG_STATE_HOME   DEFAULT=@{HOME}/.local/state

# Scripts
PATH DEFAULT=${PATH}:${HOME}/.local/bin
PATH DEFAULT=${PATH}:${HOME}/.scripts
PATH DEFAULT=${PATH}:${HOME}/.local/scripts
PATH DEFAULT=${PATH}:${HOME}/.bun/bin
PATH DEFAULT=${PATH}:${HOME}/.cargo/bin
PATH DEFAULT=${PATH}:${HOME}/.deno/bin
PATH DEFAULT=${PATH}:${HOME}/go/bin
PATH DEFAULT=${PATH}:${XDG_DATA_HOME}/bob/nvim-bin
PATH DEFAULT=${PATH}:${XDG_DATA_HOME}/fnm

