general {
    layout = scrolling

    allow_tearing = false  # Allows `immediate` window rule to work

    gaps_workspaces = $workspaceGaps
    gaps_in = $windowGapsIn
    gaps_out = $windowGapsOut
    border_size = $windowBorderSize

    col.active_border = $activeWindowBorderColour
    col.inactive_border = $inactiveWindowBorderColour
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

scrolling {
  column_width = 0.67
  focus_fit_method = 1
  explicit_column_widths = 0.33, 0.5, 0.67, 0.81, 0.96
  follow_focus = true
  fullscreen_on_one_column = true
  direction = right
  follow_min_visible = 0.33
}
